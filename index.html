<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RidgeVPN</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
    }

    /* 🌌 Galaxy Background */
    body::before {
        content: "";
        position: fixed;
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #000000 100%);
        z-index: -2;
    }

    /* ✨ Stars */
    body::after {
        content: "";
        position: fixed;
        width: 200%;
        height: 200%;
        background: url('https://www.transparenttextures.com/patterns/stardust.png');
        animation: moveStars 60s linear infinite;
        z-index: -1;
        opacity: 0.6;
    }

    @keyframes moveStars {
        from { transform: translate(0, 0); }
        to { transform: translate(-500px, -500px); }
    }

    /* Center Content */
    .container {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    /* Fade In Animation */
    .fade-in {
        opacity: 0;
        transform: translateY(20px);
        animation: fadeIn 2s ease forwards;
    }

    .fade-in.delay {
        animation-delay: 1.5s;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h1 {
        font-size: 4rem;
        margin: 0;
        letter-spacing: 3px;
    }

    p {
        font-size: 1.2rem;
        opacity: 0.8;
        margin-top: 10px;
    }

    /* Button */
    .btn {
        margin-top: 30px;
        padding: 12px 30px;
        border: none;
        background: #4cc9f0;
        color: black;
        font-size: 1rem;
        border-radius: 25px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #90dbf4;
        transform: scale(1.05);
    }
</style>
</head>

<body>

<div class="container">
    <h1 class="fade-in">RidgeVPN</h1>
    <p class="fade-in delay">Fast. Secure. Built Different.</p>
    <a href="https://youtube.com/@RidgeMan5twitchtv">
    <button class="btn fade-in delay">Get Started</button>
</a>
</div>

</body>
</html>
